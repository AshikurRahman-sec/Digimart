services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: digimart
      POSTGRES_PASSWORD: digimart
      POSTGRES_DB: digimart
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U digimart"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: digimart
      RABBITMQ_DEFAULT_PASS: digimart
      RABBITMQ_DEFAULT_VHOST: digimart
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  identity:
    build:
      context: .
      dockerfile: backend/services/identity/Dockerfile
    environment:
      IDENTITY_DATABASE_URL: postgresql+asyncpg://digimart:digimart@postgres:5432/digimart
      IDENTITY_RABBITMQ_URL: amqp://digimart:digimart@rabbitmq:5672/digimart
      IDENTITY_ACCESS_TOKEN_SECRET: change-me-use-openssl-rand-hex-32
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8001"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:8001/api/v1
    volumes:
      - ./frontend:/app:delegated
      - /app/node_modules
    command: sh -c "npm install --legacy-peer-deps && npm run dev -- --hostname 0.0.0.0"
    ports:
      - "3000:3000"
    depends_on:
      identity:
        condition: service_healthy

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Creates private bucket on startup
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/digimart-content;
      mc anonymous set none local/digimart-content;
      exit 0;
      "

volumes:
  postgres_data:
  rabbitmq_data:
  minio_data:
